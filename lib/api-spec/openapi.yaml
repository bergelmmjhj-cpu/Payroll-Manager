openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MMJ Payroll System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: sync
  - name: workers
  - name: hotels
  - name: payPeriods
  - name: timeEntries
  - name: payments
  - name: invoices
  - name: businessProfiles
  - name: logos
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── Sync ───────────────────────────────────────────────────────────────────
  /sync/workers:
    post:
      operationId: syncWorkers
      tags: [sync]
      summary: Sync workers from Render DB
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /sync/hotels:
    post:
      operationId: syncHotels
      tags: [sync]
      summary: Sync hotels/workplaces from Render DB
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  # ─── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ─── Workers ────────────────────────────────────────────────────────────────
  /workers:
    get:
      operationId: listWorkers
      tags: [workers]
      summary: List all workers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [payroll, subcontractor, all]
        - name: region
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Worker"
    post:
      operationId: createWorker
      tags: [workers]
      summary: Create a new worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkerBody"
      responses:
        "201":
          description: Created worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"

  /workers/{id}:
    get:
      operationId: getWorker
      tags: [workers]
      summary: Get a worker by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateWorker
      tags: [workers]
      summary: Update a worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkerBody"
      responses:
        "200":
          description: Updated worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
    delete:
      operationId: deleteWorker
      tags: [workers]
      summary: Delete a worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Hotels ─────────────────────────────────────────────────────────────────
  /hotels:
    get:
      operationId: listHotels
      tags: [hotels]
      summary: List all hotels/worksites
      parameters:
        - name: region
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"
    post:
      operationId: createHotel
      tags: [hotels]
      summary: Create a hotel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHotelBody"
      responses:
        "201":
          description: Created hotel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"

  /hotels/{id}:
    get:
      operationId: getHotel
      tags: [hotels]
      summary: Get a hotel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateHotel
      tags: [hotels]
      summary: Update a hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHotelBody"
      responses:
        "200":
          description: Updated hotel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
    delete:
      operationId: deleteHotel
      tags: [hotels]
      summary: Delete a hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /hotels/{id}/worker-rates:
    get:
      operationId: listHotelWorkerRates
      tags: [hotels]
      summary: List saved worker rate overrides for a hotel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel worker rate overrides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkerHotelRate"

  # ─── Pay Periods ─────────────────────────────────────────────────────────────
  /pay-periods:
    get:
      operationId: listPayPeriods
      tags: [payPeriods]
      summary: List all pay periods
      responses:
        "200":
          description: List of pay periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayPeriod"
    post:
      operationId: createPayPeriod
      tags: [payPeriods]
      summary: Create a pay period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePayPeriodBody"
      responses:
        "201":
          description: Created pay period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayPeriod"

  /pay-periods/{id}:
    get:
      operationId: getPayPeriod
      tags: [payPeriods]
      summary: Get pay period with all entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pay period detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayPeriodDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePayPeriod
      tags: [payPeriods]
      summary: Update a pay period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePayPeriodBody"
      responses:
        "200":
          description: Updated pay period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayPeriod"
    delete:
      operationId: deletePayPeriod
      tags: [payPeriods]
      summary: Delete a pay period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Time Entries ────────────────────────────────────────────────────────────
  /pay-periods/{periodId}/entries:
    get:
      operationId: listTimeEntries
      tags: [timeEntries]
      summary: List time entries for a pay period
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: hotelId
          in: query
          schema:
            type: integer
        - name: workerId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [payroll, subcontractor]
      responses:
        "200":
          description: List of time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"
    post:
      operationId: createTimeEntry
      tags: [timeEntries]
      summary: Create a time entry
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeEntryBody"
      responses:
        "201":
          description: Created time entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /pay-periods/{periodId}/entries/{id}:
    patch:
      operationId: updateTimeEntry
      tags: [timeEntries]
      summary: Update a time entry
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimeEntryBody"
      responses:
        "200":
          description: Updated time entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"
    delete:
      operationId: deleteTimeEntry
      tags: [timeEntries]
      summary: Delete a time entry
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Bulk time entry upsert ───────────────────────────────────────────────
  /pay-periods/{periodId}/entries/bulk:
    post:
      operationId: bulkUpsertTimeEntries
      tags: [timeEntries]
      summary: Bulk upsert time entries (used by import wizard)
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpsertTimeEntriesBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkUpsertResult"

  /pay-periods/{periodId}/hotels/{id}/entries/save:
    post:
      operationId: saveHotelSectionEntries
      tags: [timeEntries]
      summary: Save all entries for one pay-period hotel section
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkSaveHotelEntriesBody"
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelSectionSaveResult"

  # ─── Tally ───────────────────────────────────────────────────────────────────
  /pay-periods/{periodId}/tally:
    get:
      operationId: getPayPeriodTally
      tags: [payPeriods]
      summary: Get tally summary for a pay period
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tally summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TallySummary"

  # ─── Payments ────────────────────────────────────────────────────────────────
  /pay-periods/{periodId}/payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments for a pay period
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: method
          in: query
          schema:
            type: string
            enum: [etransfer, cheque, cash, all]
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a payment record
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /pay-periods/{periodId}/payments/{id}:
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: Update a payment (e.g. mark paid)
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentBody"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pay-periods/{periodId}/payments/{id}/mark-paid:
    post:
      operationId: markPaymentPaid
      tags: [payments]
      summary: Mark a payment as paid
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ─── Export ───────────────────────────────────────────────────────────────────
  /pay-periods/{periodId}/export:
    get:
      operationId: exportPayPeriod
      tags: [payPeriods]
      summary: Export pay period data as CSV
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [payroll, subcontractors, etransfer, cheque, tally, missing]
      responses:
        "200":
          description: CSV data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  # ─── Excel Import ─────────────────────────────────────────────────────────────
  /import/analyze:
    post:
      operationId: analyzeImport
      tags: [payPeriods]
      summary: Analyze uploaded Excel workbook and return sheet summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeImportBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAnalysis"

  /import/confirm:
    post:
      operationId: confirmImport
      tags: [payPeriods]
      summary: Confirm and execute import into a pay period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmImportBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  # ─── Business Profiles ───────────────────────────────────────────────────────
  /business-profiles:
    get:
      operationId: listBusinessProfiles
      tags: [businessProfiles]
      summary: List all business profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessProfile"
    post:
      operationId: createBusinessProfile
      tags: [businessProfiles]
      summary: Create a business profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessProfileBody"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"

  /business-profiles/{id}:
    get:
      operationId: getBusinessProfile
      tags: [businessProfiles]
      summary: Get a business profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"
    patch:
      operationId: updateBusinessProfile
      tags: [businessProfiles]
      summary: Update a business profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"
    delete:
      operationId: deleteBusinessProfile
      tags: [businessProfiles]
      summary: Delete a business profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /business-profiles/{id}/set-default:
    post:
      operationId: setDefaultBusinessProfile
      tags: [businessProfiles]
      summary: Set a profile as the default
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessProfile"

  # ─── Logos ───────────────────────────────────────────────────────────────────
  /logos:
    get:
      operationId: listLogos
      tags: [logos]
      summary: List all uploaded logos
      responses:
        "200":
          description: List of logos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Logo"
    post:
      operationId: uploadLogo
      tags: [logos]
      summary: Upload a logo file (base64 encoded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadLogoBody"
      responses:
        "201":
          description: Uploaded logo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Logo"

  /logos/{id}:
    get:
      operationId: getLogo
      tags: [logos]
      summary: Get a logo (returns base64 data)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Logo data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Logo"
    delete:
      operationId: deleteLogo
      tags: [logos]
      summary: Delete a logo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Invoices ─────────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, all]
        - name: clientName
          in: query
          schema:
            type: string
        - name: periodId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice (manual or auto-generated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  /invoices/generate-from-period:
    post:
      operationId: generateInvoiceFromPeriod
      tags: [invoices]
      summary: Auto-generate a draft invoice from pay period data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInvoiceFromPeriodBody"
      responses:
        "201":
          description: Generated invoice draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice (fields + line items)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/mark-sent:
    post:
      operationId: markInvoiceSent
      tags: [invoices]
      summary: Mark invoice as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated invoice
          content:
